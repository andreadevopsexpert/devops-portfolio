name: CD Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Extraer metadata para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./docker/multi-stage
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging   

    steps:
      - uses: actions/checkout@v4

      - name: Desplegar a Staging
        run: |
          echo "Desplegando versión ${{ needs.build.outputs.image-tag }} a staging..."
          # Aquí va: kubectl set image deployment/app ...
          # o: helm upgrade --install app ./kubernetes/helm-charts

  approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   

    steps:
      - name: Esperando aprobación
        run: echo "Aprobado. Procediendo con despliegue a producción."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - uses: actions/checkout@v4

      - name: Desplegar a Producción
        run: |
          echo "Desplegando a producción..."
